<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Tells mobile browsers to render at device width instead of a zoomed-out desktop view -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Personal portfolio and links for Your Name — software developer." />
  <title>Your Name — Software Developer</title>
  <link rel="icon" href="assets/profile.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Semantic landmarks (<header>, <main>, <nav>, <footer>) let screen readers
       and search engines understand the page structure. -->
  <header class="site-header">
    <img class="avatar" src="assets/profile.svg" alt="Portrait of Your Name" width="128" height="128" />
    <h1>Your Name</h1>
    <p class="tagline">Software developer &middot; C++ &amp; C# &middot; Building things that run fast</p>

    <!-- Link buttons are rendered here by js/main.js from data/links.json -->
    <nav aria-label="Social and contact links">
      <ul id="links" class="link-list"></ul>
    </nav>
  </header>

  <main>
    <section id="projects" aria-labelledby="projects-heading">
      <h2 id="projects-heading">Projects</h2>
      <!-- Project cards are rendered here by js/main.js from data/projects.json -->
      <div id="project-grid" class="project-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year">2026</span> Your Name</p>
  </footer>

  <noscript>
    <p class="notice">This site needs JavaScript enabled to display links and projects.</p>
  </noscript>

  <script src="js/main.js"></script>
</body>
</html>
